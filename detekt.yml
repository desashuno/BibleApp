build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInInterfaces: 15
  ComplexCondition:
    threshold: 4
  CyclomaticComplexMethod:
    threshold: 15

naming:
  FunctionNaming:
    functionPattern: '[a-z][a-zA-Z0-9]*'
    ignoreAnnotated:
      - 'Composable'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Z_0-9]*'
  ClassNaming:
    classPattern: '[A-Z][a-zA-Z0-9]*'
  PackageNaming:
    packagePattern: '[a-z][a-z_0-9]*(\.[a-z][a-z_0-9]*)*'

style:
  WildcardImport:
    active: true
  MaxLineLength:
    maxLineLength: 120
    excludeCommentStatements: true
    excludeRawStrings: true
    excludeImportStatements: true
    excludePackageStatements: true
  UnusedPrivateMember:
    active: true
    allowedNames: '_|ignored|expected'
  MagicNumber:
    active: false
  ReturnCount:
    max: 3
  ForbiddenComment:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'Exception'
      - 'RuntimeException'
      - 'Throwable'
    allowedExceptionNameRegex: '_|(ignored|expected).*'
