site_name: BibleStudio Documentation
site_description: Technical documentation for the BibleStudio Kotlin Multiplatform Bible study application
site_url: https://biblestudio.org/docs/
repo_url: https://github.com/BibleStudio/BibleStudio
repo_name: BibleStudio/BibleStudio

docs_dir: doc
site_dir: site

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: "Español"
          build: true
          theme:
            language: es
          nav_translations:
            # Top-level tabs
            Home: Inicio
            Core: Fundamentos
            "Modules \u2014 Read": "Módulos \u2014 Lectura"
            "Modules \u2014 Study": "Módulos \u2014 Estudio"
            "Modules \u2014 Write": "Módulos \u2014 Escritura"
            "Modules \u2014 Tools": "Módulos \u2014 Herramientas"
            "Modules \u2014 Resources": "Módulos \u2014 Recursos"
            "Modules \u2014 Media": "Módulos \u2014 Multimedia"
            Shared Services: Servicios Compartidos
            Module Template: Plantilla de Módulo
            Roadmap: Hoja de Ruta
            Reports: Informes
            Testing: Pruebas
            # Core documents
            Architecture: Arquitectura
            Data Layer: Capa de Datos
            Design System: Sistema de Diseño
            Platform Strategy: Estrategia de Plataforma
            Module System: Sistema de Módulos
            Code Conventions: Convenciones de Código
            Getting Started: Primeros Pasos
            Security: Seguridad
            Open Data Sources: Fuentes de Datos Abiertas
            # Shared nav labels across modules
            Overview: Descripción General
            Data Model: Modelo de Datos
            Component State: Estado del Componente
            Routes: Rutas
            UI Components: Componentes UI
            # Module names
            Bible Reader: Lector Bíblico
            Reading Plans: Planes de Lectura
            Cross References: Referencias Cruzadas
            Word Study: Estudio de Palabras
            "Morphology & Interlinear": "Morfología e Interlineal"
            Passage Guide: Guía de Pasaje
            Exegetical Guide: Guía Exegética
            Knowledge Graph: Grafo de Conocimiento
            Theological Atlas: Atlas Teológico
            Note Editor: Editor de Notas
            Sermon Editor: Editor de Sermones
            Search: Búsqueda
            Highlights: Resaltados
            Workspace: Espacio de Trabajo
            Module System: Sistema de Módulos
            "Import/Export": "Importar/Exportar"
            Settings: Configuración
            "Bookmarks & History": "Marcadores e Historial"
            Resource Library: Biblioteca de Recursos
            Audio Sync: Audio Sincronizado
            Share Verse: Compartir Versículo
            Template: Plantilla
            # Roadmap phases
            Build Plan: Plan de Construcción
            "Phase 1 \u2014 Foundation": "Fase 1 \u2014 Fundamentos"
            "Phase 2 \u2014 Infrastructure": "Fase 2 \u2014 Infraestructura"
            "Phase 3 \u2014 Core Modules": "Fase 3 \u2014 Módulos Base"
            "Phase 4 \u2014 Study & Writing": "Fase 4 \u2014 Estudio y Escritura"
            "Phase 5 \u2014 Advanced": "Fase 5 \u2014 Avanzado"
            "Phase 6 \u2014 Data Integration": "Fase 6 \u2014 Integración de Datos"
            "Phase 7 \u2014 Integration Verification": "Fase 7 \u2014 Verificación de Integración"
            "Phase 8 \u2014 Module Review": "Fase 8 \u2014 Revisión de Módulos"
            "Phase 9 \u2014 Resource Library Redesign": "Fase 9 \u2014 Rediseño de Biblioteca"
            "Phase 10 \u2014 Bible Reader Enhancement": "Fase 10 \u2014 Mejora del Lector Bíblico"
            # Reports
            Red Letter Issues: Problemas de Letras Rojas
            Red Letter Solutions: Soluciones de Letras Rojas
            Red Letter Fix Log: Registro de Correcciones
            # Testing
            Phase 8 Manual Checklist: Lista de Verificación Fase 8

